<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Vrum Vrum</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js"></script>
</head>
<body class="login-body">
    <div id="overlay" class="overlay">
        <div class="modal">
            <p id="mensagem"></p>
            <button class="button-login" onclick="fecharOverlay()">OK</button>
        </div>
    </div>

    <main class="rightContainer">
        <form id="form-login" onsubmit="cadastrar(event)">
            <h1 class="h1-login">Criar Conta</h1>
            
            <div class="inputs">
                <div class="grupoLabelInput">
                    <label>Nome</label>
                    <input type="text" id="input-nome" placeholder="Seu nome" required>
                </div>
                <div class="grupoLabelInput">
                    <label>E-mail</label>
                    <input type="email" id="input-email" placeholder="email@exemplo.com" required>
                </div>
                <div class="grupoLabelInput">
                    <label>Senha</label>
                    <input type="password" id="input-senha" placeholder="******" required>
                </div>
            </div>

            <button type="submit" class="button-login">Cadastrar</button>
            <button type="button" class="button-cadastrados" onclick="verCadastrados()">Já tenho conta (Login)</button>
        </form>
    </main>
</body>
</html>
